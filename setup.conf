# =============================================================================
# fritzFlux - Setup & Deployment
# =============================================================================


# --- Local Development Setup ---
command -v python3.13 >/dev/null 2>&1 && PYTHON=python3.13 || PYTHON=python3
$PYTHON -m venv /opt/fritzflux/.venv
source /opt/fritzflux/.venv/bin/activate
pip install --upgrade pip
pip install -r /opt/fritzflux/requirements.txt


# --- BUILD & RUN ---
/opt/fritzflux/docker/build.sh

cd /opt/fritzflux && source .venv/bin/activate && python run.py


# Prune
docker system prune -af
docker buildx prune -af

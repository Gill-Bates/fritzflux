services:
  questdb:
    image: questdb/questdb:latest
    container_name: questdb
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9003:9003"
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false

  fritzfluxdb:
    image: giiibates/fritzfluxdb:latest
    container_name: fritzfluxdb_questdb
    restart: unless-stopped
    stop_grace_period: 20s
    depends_on:
      - questdb
    env_file:
      - ./.env
    environment:
      TZ: ${TZ:-Europe/Berlin}
      FRITZBOX_HOSTNAME: ${FRITZBOX_HOSTNAME:-192.168.178.1}
      FRITZBOX_USERNAME: ${FRITZBOX_USERNAME}
      FRITZBOX_PASSWORD: ${FRITZBOX_PASSWORD}
      DB_TYPE: "questdb"
      QUESTDB_HOSTNAME: questdb
      QUESTDB_PORT: 9000
      QUESTDB_USERNAME: ${QUESTDB_USERNAME:-}
      QUESTDB_PASSWORD: ${QUESTDB_PASSWORD:-}
      QUESTDB_TOKEN: ${QUESTDB_TOKEN:-}
      QUESTDB_TLS_ENABLED: ${QUESTDB_TLS_ENABLED:-false}
      # credentials (if set) are sent over HTTP inside the trusted compose network
      QUESTDB_ALLOW_PLAINTEXT_CREDENTIALS: ${QUESTDB_ALLOW_PLAINTEXT_CREDENTIALS:-true}

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'run.py' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  questdb_data:
